<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Flow | Evening Reflection</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="reflection-page">

    <nav>
        <a href="index.html">Home</a>
        <a href="morning.html">Morning</a>
        <a href="work.html">Work</a>
        <a href="reflection.html" class="active">Reflection</a>
    </nav>

    <main class="checklist-container">
        <header>
            <h1>Evening Reflection</h1>
            <p>Close the loop on your day and prepare for rest.</p>
        </header>

        <section class="checklist">
            <label class="task-item">
                <input type="checkbox">
                <span>Log Today's Progress</span>
            </label>

            <label class="task-item">
                <input type="checkbox">
                <span>Plan Top 3 Tasks for Tomorrow</span>
            </label>

            <label class="task-item">
                <input type="checkbox">
                <span>Digital Detox (Screens Off)</span>
            </label>

            <label class="task-item">
                <input type="checkbox">
                <span>Read for 20 Minutes</span>
            </label>
        </section>

        <section class="journal-section" style="margin-top: 30px;">
            <h3>What was your biggest win today?</h3>
            <textarea id="daily-win" placeholder="Write your reflection here..."></textarea>
        </section>

        <footer style="margin-top: 30px; text-align: center;">
            <button onclick="saveReflection()" class="btn-save">Save & Complete Day ✨</button>
            <p style="margin-top: 15px;"><a href="index.html" style="color: var(--reflection-color); text-decoration: none;">← Back to Dashboard</a></p>
        </footer>
    </main>

    <script src="main.js"></script>
</body>
</html>
